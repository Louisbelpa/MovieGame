name: GuessToday

packages:
  GoogleSignIn:
    url: https://github.com/google/GoogleSignIn-iOS
    from: "8.0.0"

options:
  bundleIdPrefix: fr.guesstoday
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  indentWidth: 4
  tabWidth: 4

targets:
  GuessToday:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: GuessToday
    dependencies:
      - package: GoogleSignIn
        product: GoogleSignIn
      - package: GoogleSignIn
        product: GoogleSignInSwift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: fr.guesstoday.app
        DEVELOPMENT_TEAM: "YOUR_TEAM_ID"
        SWIFT_VERSION: "5.10"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        IPHONEOS_DEPLOYMENT_TARGET: "17.0"
        CODE_SIGN_STYLE: Automatic
        ENABLE_HARDENED_RUNTIME: YES
        DEBUG_INFORMATION_FORMAT: dwarf-with-dsym
        SWIFT_OPTIMIZATION_LEVEL: "-Onone"
      configs:
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    entitlements:
      path: GuessToday/App/GuessToday.entitlements
      properties:
        aps-environment: development
    info:
      path: GuessToday/App/Info.plist
      properties:
        CFBundleName: GuessToday
        CFBundleDisplayName: GuessToday
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        NSAppTransportSecurity:
          NSExceptionDomains:
            localhost:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        # Google Sign-In URL scheme — set GOOGLE_REVERSED_CLIENT_ID in Build Settings
        # e.g. com.googleusercontent.apps.YOUR_CLIENT_ID_REVERSED
        CFBundleURLTypes:
          - CFBundleTypeRole: Editor
            CFBundleURLSchemes:
              - $(GOOGLE_REVERSED_CLIENT_ID)
