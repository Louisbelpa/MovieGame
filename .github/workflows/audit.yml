name: Security Audit

on:
  # Permet le lancement manuel depuis l'onglet Actions
  workflow_dispatch:

  # Conserve le scan automatique du lundi matin (optionnel, tu peux le supprimer)
  schedule:
    - cron: '0 8 * * 1'

permissions:
  contents: read

jobs:
  audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Audit frontend
        run: npm audit --audit-level=moderate
      - name: Audit backend
        working-directory: backend
        run: npm audit --audit-level=moderate
