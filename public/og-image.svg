<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#16161f"/>

  <!-- Subtle grid decoration -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#d4a842" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#d4a842" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Gold border frame -->
  <rect x="48" y="48" width="1104" height="534" rx="20" fill="none" stroke="#d4a842" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Film icon (simplified clapperboard) -->
  <!-- Rounded rect body -->
  <rect x="508" y="170" width="184" height="148" rx="16" fill="none" stroke="#d4a842" stroke-width="5"/>
  <!-- Film strip holes left -->
  <rect x="518" y="183" width="18" height="32" rx="4" fill="#d4a842" opacity="0.7"/>
  <rect x="518" y="227" width="18" height="32" rx="4" fill="#d4a842" opacity="0.7"/>
  <rect x="518" y="271" width="18" height="32" rx="4" fill="#d4a842" opacity="0.7"/>
  <!-- Film strip holes right -->
  <rect x="664" y="183" width="18" height="32" rx="4" fill="#d4a842" opacity="0.7"/>
  <rect x="664" y="227" width="18" height="32" rx="4" fill="#d4a842" opacity="0.7"/>
  <rect x="664" y="271" width="18" height="32" rx="4" fill="#d4a842" opacity="0.7"/>
  <!-- Inner screen -->
  <rect x="546" y="185" width="108" height="74" rx="6" fill="#d4a842" opacity="0.12"/>

  <!-- Title -->
  <text
    x="600"
    y="405"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="80"
    font-weight="bold"
    fill="#d4a842"
    letter-spacing="-1"
  >CinéGuessr</text>

  <!-- Subtitle -->
  <text
    x="600"
    y="468"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="32"
    fill="#ffffff"
    opacity="0.5"
    letter-spacing="2"
  >DEVINE LE FILM DU JOUR</text>

  <!-- Gold underline accent -->
  <rect x="480" y="488" width="240" height="2" rx="1" fill="#d4a842" opacity="0.4"/>

  <!-- URL -->
  <text
    x="600"
    y="548"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    fill="#ffffff"
    opacity="0.25"
    letter-spacing="1"
  >cineguessr.fr</text>
</svg>
