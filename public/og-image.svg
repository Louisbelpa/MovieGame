<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#16161f"/>

  <!-- Subtle grid decoration -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#d4a842" stroke-opacity="0.08" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#d4a842" stroke-opacity="0.08" stroke-width="1"/>

  <!-- Gold border frame -->
  <rect x="48" y="48" width="1104" height="534" rx="20" fill="none" stroke="#d4a842" stroke-opacity="0.3" stroke-width="1.5"/>

  <!-- Three mode icons -->

  <!-- Film icon (x center 460) -->
  <rect x="425" y="172" width="70" height="56" rx="9" fill="none" stroke="#d4a842" stroke-width="3.5" opacity="0.85"/>
  <rect x="425" y="172" width="14" height="56" rx="4" fill="none" stroke="#d4a842" stroke-width="3.5" opacity="0.85"/>
  <rect x="481" y="172" width="14" height="56" rx="4" fill="none" stroke="#d4a842" stroke-width="3.5" opacity="0.85"/>
  <rect x="429" y="181" width="6" height="9" rx="2" fill="#d4a842" opacity="0.6"/>
  <rect x="429" y="197" width="6" height="9" rx="2" fill="#d4a842" opacity="0.6"/>
  <rect x="429" y="213" width="6" height="9" rx="2" fill="#d4a842" opacity="0.6"/>
  <rect x="485" y="181" width="6" height="9" rx="2" fill="#d4a842" opacity="0.6"/>
  <rect x="485" y="197" width="6" height="9" rx="2" fill="#d4a842" opacity="0.6"/>
  <rect x="485" y="213" width="6" height="9" rx="2" fill="#d4a842" opacity="0.6"/>

  <!-- Dot separator -->
  <circle cx="536" cy="200" r="4" fill="#d4a842" opacity="0.25"/>

  <!-- TV / Series icon (x center 600) -->
  <rect x="563" y="172" width="74" height="50" rx="8" fill="none" stroke="#d4a842" stroke-width="3.5" opacity="0.85"/>
  <rect x="591" y="222" width="18" height="7" rx="2" fill="#d4a842" opacity="0.5"/>
  <rect x="581" y="229" width="38" height="4" rx="2" fill="#d4a842" opacity="0.35"/>
  <!-- Antenna left -->
  <line x1="588" y1="172" x2="578" y2="159" stroke="#d4a842" stroke-width="3" stroke-linecap="round" opacity="0.6"/>
  <!-- Antenna right -->
  <line x1="612" y1="172" x2="622" y2="159" stroke="#d4a842" stroke-width="3" stroke-linecap="round" opacity="0.6"/>

  <!-- Dot separator -->
  <circle cx="664" cy="200" r="4" fill="#d4a842" opacity="0.25"/>

  <!-- Landmark / Wiki icon (x center 740) -->
  <!-- Roof triangle -->
  <polygon points="740,158 705,180 775,180" fill="none" stroke="#d4a842" stroke-width="3.5" stroke-linejoin="round" opacity="0.85"/>
  <!-- Base line -->
  <rect x="703" y="224" width="74" height="5" rx="2" fill="#d4a842" opacity="0.5"/>
  <!-- Columns -->
  <rect x="714" y="180" width="9" height="44" rx="3" fill="none" stroke="#d4a842" stroke-width="3" opacity="0.75"/>
  <rect x="736" y="180" width="9" height="44" rx="3" fill="none" stroke="#d4a842" stroke-width="3" opacity="0.75"/>
  <rect x="757" y="180" width="9" height="44" rx="3" fill="none" stroke="#d4a842" stroke-width="3" opacity="0.75"/>

  <!-- Title -->
  <text
    x="600"
    y="405"
    text-anchor="middle"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="82"
    font-weight="bold"
    fill="#d4a842"
    letter-spacing="-1"
  >GuessToday</text>

  <!-- Subtitle -->
  <text
    x="600"
    y="466"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    fill="#ffffff"
    opacity="0.45"
    letter-spacing="4"
  >FILMS · SÉRIES · WIKIPEDIA</text>

  <!-- Gold underline accent -->
  <rect x="460" y="488" width="280" height="2" rx="1" fill="#d4a842" opacity="0.35"/>

  <!-- URL -->
  <text
    x="600"
    y="548"
    text-anchor="middle"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="22"
    fill="#ffffff"
    opacity="0.25"
    letter-spacing="1"
  >guesstoday.fr</text>
</svg>
